<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio-de-sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<body>
  <main style="
        background: linear-gradient(
          120deg,
          rgb(42, 65, 165),
          #000850,
          rgb(27, 150, 250),
          blue
        );
      ">
    <div class="container">
      <div class="row justify-content-center align-items-center vh-100">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-body p-4">
              <h1 class="card-title text-center mb-4">Inicio de sesión</h1>
              <form id="formLogin ">
                <div class="mb-4">
                  <label for="nombre" class="form-label">Nombre</label>
                  <input type="text" id="nombre" class="form-control" />
                  <div id="mensajeNombre"></div>
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label">Contraseña</label>
                  <input type="password" id="password" class="form-control" placeholder="********" />
                  <div id="mensajeContraseña"></div>
                </div>

                <div class="mb-4 d-grid gap-2">
                  <input type="submit" class="btn btn-primary" value="Entrar" />
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>


  <footer class="p-neutral">
        <div class="container-fluid margin-b border-bottom border-1 border-secondary ">
            <div class="d-lg-none mt-2  align-items-center text-center">
                <button class="btn bi bi-list-ul  " type="button" data-bs-toggle="collapse" data-bs-target="#footerInfo"
                    aria-controls="footerInfo" aria-expanded="false" aria-label="Toggle navigation"> Ver más
                </button>
            </div>
            <div id="footerInfo" class="collapse d-lg-flex row justify-content-center mb-2">
                <div class="col-lg-4 col-12 mt-2 ">
                    <h5 class="text-center">TIENDAS</h5>
                    <ul class="nav flex-column align-items-center">
    
                        <li class="nav-item mb-2">
                            <i class="bi bi-geo-alt"></i> Sarmiento 205
                        </li>
    
                        <li class="nav-item mb-2">
                            <i class="bi bi-geo-alt"></i> Rivadavia 2010
                        </li>
                    </ul>
                </div>
                <div class="col-lg-4 col-12 mt-2">
                    <h5 class="text-center">HORARIO</h5>
                    <h6 class="text-center">Lunes a Sábados</h6>
                    <ul class="nav flex-column align-items-center">
                        <li class="nav-item">
                            <p class="text-center">7.30 a 21.30 hs.</p>
                        </li>
    
                    </ul>
                </div>
                <div class="col-lg-4 col-12 mt-2">
                    <h5 class="text-center">Contacto</h5>
                    <ul class="nav flex-column align-items-center">
                        <li class="nav-item mb-2">
                            <i class="bi bi-envelope"></i>
                            <a href="mailto:panaderia@gmail.com"
                                class="text-decoration-none text-dark">panaderia@gmail.com</a>
                        </li>

                            <i class="bi bi-telephone-fill"></i>
                            <a href="tel:+5402912026616" class="text-decoration-none text-dark">+54-0291-2026616</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div class="mt-2">
        <p class="text-center">© 1998 Panaderia, ATR</p>
        </div>
