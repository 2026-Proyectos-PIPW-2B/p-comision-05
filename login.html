<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio-de-sesión</title>
  <link rel="stylesheet" href="css/customBoostrap.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style-utilities.css">
</head>

<body>
  <main class="login-background">
    <div class="container">
      <div class="row justify-content-center align-items-center vh-100">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-body p-4 bg-light">
              <h1 class="card-title text-center mb-4 fw-semibold text-black">
                Panaderia ATR
                <img src="img/panaderia-icon.png" alt="Icono" width="40" height="40">
              </h1>
              <h6 class="card-subtitle mb-2 text-body-secondary fw-semibold">Inicio de sesion:</h6>
              <form id="formLogin">
                <div class="mb-4">
                  <label for="inputNombre" class="form-label fw-semibold">Nombre de Usuario</label>
                  <input type="text" id="inputNombre" class="form-control" placeholder="..."/>
                  <div class="invalid-feedback" id="mensajeNombre">sdd</div>
                </div>

                <div class="mb-4">
                  <label for="inputPassword" class="form-label fw-semibold">Contraseña</label>
                  <input type="password" id="inputPassword" class="form-control" placeholder="..." />
                  <div class="invalid-feedback" id="mensajeContraseña"></div>
                </div>

                <div class="mb-4 d-grid gap-2">
                  <input type="submit" class="btn btn-primary fw-semibold" id="botonLogin" value="Entrar" />
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <button id="buttonLocalStorage" type="button" class="btn btn-primary btn-lg position-relative bottom-0 m-4 rounded">
      <i class="bi bi-floppy"></i>
      Iniciar localStorage
    </button>
  </main>


  <footer class="p-neutral bg-light">
        <div class="container-fluid margin-b border-bottom border-1 border-black ">
            <div class="d-lg-none mt-2  align-items-center text-center">
                <button id="buttonFooter" class="btn bi bi-list-ul  " type="button" data-bs-toggle="collapse" data-bs-target="#footerInfo"
                    aria-controls="footerInfo" aria-expanded="false" aria-label="Toggle navigation"> Ver más
                </button>
            </div>
            <div id="footerInfo" class="collapse d-lg-flex row justify-content-center mb-2">
                <div class="col-lg-4 col-12 mt-2 ">
                    <h5 class="text-center">TIENDAS</h5>
                    <ul class="nav flex-column align-items-center">   
                        <li class="nav-item mb-2">
                            <i class="bi bi-geo-alt"></i> Sarmiento 205
                        </li>
    
                        <li class="nav-item mb-2">
                            <i class="bi bi-geo-alt"></i> Rivadavia 2010
                        </li>
                    </ul>
                </div>
                <div class="col-lg-4 col-12 mt-2">
                    <h5 class="text-center">HORARIO</h5>
                    <h6 class="text-center">Lunes a Sábados</h6>
                    <ul class="nav flex-column align-items-center">
                        <li class="nav-item">
                            <p class="text-center">7.30 a 21.30 hs.</p>
                        </li>
    
                    </ul>
                </div>
                <div class="col-lg-4 col-12 mt-2">
                    <h5 class="text-center">Contacto</h5>
                    <ul class="nav flex-column align-items-center">
                        <li class="nav-item mb-2">
                            <i class="bi bi-envelope"></i>
                            <a href="mailto:panaderia@gmail.com"
                                class="text-decoration-none text-dark">panaderia@gmail.com</a>
                        </li>
                        <li class="nav-item ">
                            <i class="bi bi-telephone-fill"></i>
                            <a href="tel:+5402912026616" class="text-decoration-none text-dark">+54-0291-2026616</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div class="mt-2">
        <p class="text-center p-neutral m-0">© 1998 Panaderia, ATR</p>
        </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="js/login.js"></script>
  <script src="js/manejoDeFooter.js"></script>
  <script type="module" src="js/iniciarLocalStorage.js"></script>
</body>

</html>
