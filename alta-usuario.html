        <div class="p-neutral ps-lg-0 flex-grow-1 d-flex justify-content-center align-items-start">
            <div class="w-100 max-w-1200">
                <div class="table-responsive border rounded shadow">
                    <table class="table m-0 table-hover text-center table-striped">
                        <thead>
                            <tr>
                                <th scope="col">Nombre</th>
                                <th scope="col">Apellido</th>
                                <th scope="col">Usuario</th>
                                <th scope="col">Contraseña</th>
                                <th scope="col">Estado</th>
                                <th scope="col">Rol</th>
                                <th scope="col">Historial</th>

                        </tbody>

    <!--Modal registro-de-usuario-->
    <button type="button" class="btn btn-primary btn-lg position-fixed bottom-0 end-0  m-4 rounded-start-circle"
        data-bs-toggle="modal" data-bs-target="#modal" data-bs-whatever="@mdo" style="z-index: 2;">
        <i class="bi bi-plus"></i>
    </button>
    <div class="modal fade z-index-modal" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content ">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <h1 class="card-title text-center mb-4">Registro De Usuarios</h1>
                            <form id="formRegistro_usuario">
                                <div class="mb-4">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" id="registro_nombre" class="form-control" />
                                </div>
                                <div class="mb-4">
                                    <label for="apellido" class="form-label">Apellido</label>
                                    <input type="text" id="registro_apellido" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <label for="nombre-usuario" class="form-label">Nombre De Usuario</label>
                                    <input type="text" id="registro_nombre_usuario" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <label for="contraseña" class="form-label">Contraseña</label>
                                    <input type="password" id="registro_contraseña" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <div class="form-check">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="rolUsuario"
                                                id="rol_usuario" value="user" checked />
                                            <label class="form-check-label cursor-pointer" for="rol_usuario">Usuario</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="rolUsuario"
                                                id="rol_usuario_admin" value="admin" />
                                            <label class="form-check-label cursor-pointer" for="rol_usuario_admin">Admin</label>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="form-check" class="form-label">Estado</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch"
                                                id="switch_estado">
                                            <label class="form-check-label cursor-pointer" for="switch_estado">Activar Usuario</label>
                                        </div>
                                    </div>
                                </div>

                            </form>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="crearUsuario" type="button" class="btn btn-primary">Crear Usuario</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade z-index-modal" id="modalHistorial" tabindex="-1" aria-labelledby="modalHistorialLabel" aria-hidden="true">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalHistorialLabel">Historial de Compras</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="historialContenedor"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para el boton de ver mas, de los carritos-->
    <div class="modal fade z-index-modal" id="modalCompra" tabindex="-1" aria-labelledby="modalCompraLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCompraLabel">Productos de la Compra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="modalProductos" class="d-flex flex-column gap-2"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-toggle="modal"
                        data-bs-target="#modalHistorial">Volver al Historial</button>
                </div>
            </div>
        </div>
