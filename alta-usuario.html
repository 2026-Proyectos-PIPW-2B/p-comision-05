<!doctype html>
<html lang="es" data-bs-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panaderia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style-utilities.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
        <div class="container-fluid d-flex">
            <a class="navbar-brand w-30 m-0">Panaderia</a>
            <form class="d-flex w-40" role="search">
                <input class="form-control" type="search" placeholder="Search" aria-label="Search" />
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            <div class="d-flex justify-content-end d-lg-none w-30">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse flex-grow-0 w-30" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item ms-auto">
                        <a class="nav-link active" aria-current="page" href="#">Tienda</a>
                    </li>
                    <li class="nav-item ms-auto">
                        <a class="nav-link" href="#">Carrito</a>
                    </li>
                    <li class="nav-item ms-auto">
                        <a class="nav-link" href="#">Registro</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <section id="tienda" class="flex-grow-1 w-100 d-flex flex-column flex-lg-row">
        <div class="p-neutral d-flex flex-wrap pixel-w-lg-180 border-end">
            <div class="ms-auto d-lg-none">
                <div class="btn-group" role="group" aria-label="Basic outlined example">
                    <input type="checkbox" id="btnFiltros" class="btn-check" data-bs-toggle="collapse"
                        data-bs-target="#filtros" aria-expanded="false" aria-controls="filtros">
                    <label for="btnFiltros" class="btn btn-outline-primary">Filtros !</label>
                </div>
            </div>
            <form id="filtros" class="collapse d-lg-block w-100 ">
                <select id="filtroCategoria" class="form-select">
                    <option value="">Filtrar</option>
                    <option value="categoria1">Ascendente</option>
                    <option value="categoria1">Decendente </option>
                    <option value="categoria1">Por Apellido</option>
                </select>
            </form>
        </div>
        <div class="p-neutral ps-lg-0 flex-grow-1 d-flex justify-content-center align-items-start">
            <div class="w-100 max-w-1200">
                <div class="table-responsive">
                    <table class="table m-0 table-hover">
                        <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Nombre</th>
                                <th scope="col">Apellido</th>
                                <th scope="col">Usuario</th>
                                <th scope="col">Contraseña</th>
                                <th scope="col">Estado</th>
                                <th scope="col">Rol</th>
                                <th scope="col">Historial</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">1</th>
                                <td>Tim</td>
                                <td>Payne</td>
                                <td>tim-payne</td>
                                <td>messi123</td>
                                <td><button type="button" class="btn btn-sm btn-warning" disabled>Habilitado</button>
                                </td>
                                <td class="">
                                    <button type="button" class="btn btn-sm btn-success" disabled>Usuario</button>
                                </td>
                                <td>
                                    <i class="bi bi-justify"></i>
                                </td>

                                <td>
                                    <i class="bi bi-pencil-square"></i>
                                    <i class="bi bi-trash3-fill"></i>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    </div>
                </div>
        </div>
    </section>

    <!--Modal registro-de-usuario-->
    <button type="button" class="btn btn-primary  btn-lg position-fixed bottom-0 end-0  m-4 rounded-circle"
        data-bs-toggle="modal" data-bs-target="#modal" data-bs-whatever="@mdo" style="z-index: 2;">
        <i class="bi bi-plus"></i>
    </button>
    <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal static" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <h1 class="card-title text-center mb-4">Registro De Usuarios</h1>
                            <form id="formLogin">
                                <div class="mb-4">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" id="nombre" class="form-control" />
                                </div>
                                <div class="mb-4">
                                    <label for="apellido" class="form-label">Apellido</label>
                                    <input type="text" id="apellido" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <label for="nombre-usuario" class="form-label">Nombre De Usuario</label>
                                    <input type="text" id="nombre-usuario" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <label for="contraseña" class="form-label">Contraseña</label>
                                    <input type="password" id="contraseña" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <label for="form-check" class="form-label">Rol De Usuario</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="radioDefault"
                                            id="rol-usuario-usuario">
                                        <label class="form-check-label" for="rol-usuario-usuario">
                                            Usuario
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="radioDefault"
                                            id="rol-usuario-admin" checked>
                                        <label class="form-check-label" for="rol-usuario-admin">
                                            Admin
                                        </label>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="form-check" class="form-label">Estado</label>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" role="switch"
                                            id="switchCheckDefault">
                                        <label class="form-check-label" for="switchCheckDefault">Activar Usuario</label>
                                    </div>
                                </div>

                            </form>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary">Crear Usuario</button>
                    </div>
                </div>
            </div>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
