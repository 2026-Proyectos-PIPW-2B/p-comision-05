            <div class="d-flex justify-content-end d-xxl-none w-30">

                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse flex-grow-0 w-30" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item ms-auto">
                        <a class="nav-link text-nowrap" aria-current="page" href="control-de-productos.html">Alta
                            Productos</a>

                    <li class="nav-item ms-auto">
                        <a class="nav-link " href="control-registros.html">Registros</a>
                    </li>
                    <li class="nav-item ms-auto text-nowrap">
                        <a class="nav-link active" href="alta-usuario.html">Alta Usuario</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <section id="tienda" class="flex-grow-1 w-100 d-flex flex-column flex-lg-row">
        <div class="p-neutral d-flex flex-wrap pixel-w-lg-180 border-end">
            <!--<div class="ms-auto d-lg-none">
                <div class="btn-group" role="group" aria-label="Basic outlined example">
                    <input type="checkbox" id="btnFiltros" class="btn-check" data-bs-toggle="collapse"
                        data-bs-target="#filtros" aria-expanded="false" aria-controls="filtros">
                    <label for="btnFiltros" class="btn btn-outline-primary">Filtros !</label>
                </div>
            </div>
            <form id="filtros" class="collapse d-lg-block w-100 ">
                <select id="filtroCategoria" class="form-select">
                    <option value="">Filtrar</option>
                    <option value="categoria1">Ascendente</option>
                    <option value="categoria1">Decendente </option>
                    <option value="categoria1">Por Apellido</option>
                </select>
            </form> -->
        </div>
        <div class="p-neutral ps-lg-0 flex-grow-1 d-flex justify-content-center align-items-start">
            <div class="w-100 max-w-1200">
                <div class="table-responsive">
                    <table class="table m-0 table-hover">
                        <thead>
                            <tr>
                                <th scope="col">Nombre</th>
                                <th scope="col">Apellido</th>
                                <th scope="col">Usuario</th>
                                <th scope="col">Contraseña</th>
                                <th scope="col">Estado</th>
                                <th scope="col">Rol</th>
                                <th scope="col">Historial</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios-body">

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!--Modal registro-de-usuario-->
    <button type="button" class="btn btn-primary btn-lg position-fixed bottom-0 end-0  m-4 rounded-start-circle"
        data-bs-toggle="modal" data-bs-target="#modal" data-bs-whatever="@mdo" style="z-index: 2;">
        <i class="bi bi-plus"></i>
    </button>
    <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <h1 class="card-title text-center mb-4">Registro De Usuarios</h1>
                            <form id="formRegistro_usuario">
                                <div class="mb-4">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" id="registro_nombre" class="form-control" />
                                </div>
                                <div class="mb-4">
                                    <label for="apellido" class="form-label">Apellido</label>
                                    <input type="text" id="registro_apellido" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <label for="nombre-usuario" class="form-label">Nombre De Usuario</label>
                                    <input type="text" id="registro_nombre_usuario" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <label for="contraseña" class="form-label">Contraseña</label>
                                    <input type="password" id="registro_contraseña" class="form-control" />
                                </div>

                                <div class="mb-4">
                                    <div class="form-check">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="rolUsuario"
                                                id="rol_usuario" value="user" checked />
                                            <label class="form-check-label" for="rol_usuario">Usuario</label>
                                        </div>
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" name="rolUsuario"
                                                id="rol_usuario_admin" value="admin" />
                                            <label class="form-check-label" for="rol_usuario_admin">Admin</label>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="form-check" class="form-label">Estado</label>
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" role="switch"
                                                id="switch_estado">
                                            <label class="form-check-label" for="switch_estado">Activar Usuario</label>
                                        </div>
                                    </div>
                                </div>

                            </form>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="crearUsuario" type="button" class="btn btn-primary">Crear Usuario</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" id="modalHistorial" tabindex="-1" aria-labelledby="modalHistorialLabel" aria-hidden="true">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalHistorialLabel">Historial de Compras</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="historialContenedor"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="js/alta-usuarios.js"></script>
</body>

</html>
