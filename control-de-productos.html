<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alta-productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style-utilities.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!--Navbar -->
    <nav class="navbar navbar-expand-xxl navbar-dark bg-black sticky-top">
        <div class="container-fluid d-flex">
            <a class="navbar-brand w-30 m-0">Panaderia</a>
            <form class="d-flex w-40" role="search">
                <input class="form-control" type="search" aria-label="Search" />
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            <div class="d-flex justify-content-end d-xxl-none w-30">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse flex-grow-0 w-30" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item ms-auto">
                        <a class="nav-link text-nowrap" href="alta-usuario.html">Alta Usuario</a>
                    </li>
                    <li class="nav-item ms-auto">
                        <a class="nav-link" href="control-registros.html">Registros</a>
                    </li>
                    <li class="nav-item ms-auto " aria-current="page">
                        <a class="nav-link active text-nowrap" href="control-de-productos.html">Alta Productos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!--Filtros-->

    <section id="tienda" class="flex-grow-1 w-100 d-flex flex-column flex-lg-row bg">
        <div class="p-neutral d-flex flex-wrap pixel-w-lg-180">
            <div class="ms-auto d-lg-none">
                <div class="btn-group" role="group" aria-label="Basic outlined example">
                    <input type="checkbox" id="btnFiltros" class="btn-check" data-bs-toggle="collapse"
                        data-bs-target="#filtros" aria-expanded="false" aria-controls="filtros">
                    <label for="btnFiltros" class="btn btn-outline-primary">Filtros !</label>
                </div>
            </div>
            <form id="filtros" class="collapse d-lg-block w-100">        
                <label for="filtroTitulo" class="form-label mt-2">Titulo</label>
                <input type="text" id="filtroTitulo" class="form-control" placeholder="Ingrese un Titulo">
            
                <label for="filtroDescripcion" class="form-label mt-2">Descripción</label>
                <input type="text" id="filtroDescripcion" class="form-control" placeholder="Ingrese una Descripción">
            
                <label for="filtroStock" class="form-label mt-2">Stock</label>
                <input type="number" id="filtroStock" class="form-control" placeholder="Ingrese Una Cantidad">

                <label for="filtroEtiqueta" class="form-label mt-2">Etiquetas</label>
                <input type="text" id="filtroEtiqueta" class="form-control" placeholder="Ingrese una etiqueta">
                <button type="button" id="botonAplicarFiltros" class="btn btn-primary mt-2 ">Aplicar Filtros</button>
                <button type="button" id="botonResetearFiltros" class="btn btn-primary mt-2 w-30">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
                
            </form>
        </div>

        <!--Tabla de productos-->

        <div class="p-neutral ps-lg-0 flex-grow-1 d-flex justify-content-center align-items-start">
            <div class="w-100 max-w-1200">
                <div class="table-responsive rounded border shadow">
                    <table class="table m-0 table-hover">
                        <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Titulo</th>
                                <th scope="col">Informacion</th>
                                <th scope="col">Stock</th>
                                <th scope="col">Etiquetas</th>
                                <th scope="col">Valor</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoDeTabla">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!--Modal registro-de-productos-->
    <button type="button" class="btn btn-primary  btn-lg position-fixed bottom-0 end-0  m-4 rounded-circle"
        data-bs-toggle="modal" data-bs-target="#modal" data-bs-whatever="@mdo" style="z-index: 2;">
        <i class="bi bi-plus"></i>
    </button>
    <div class="modal fade" id="modal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="modalLabel">Alta de Producto</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <h1 class="card-title text-center mb-4">Registro De Producto</h1>
                            <form id="formRegistroProductos">
                                <div class="mb-4">
                                    <label for="registroTitulo" class="form-label">Titulo</label>
                                    <input type="text" id="registroTitulo" class="form-control" />
                                    <div class="invalid-feedback" id="mensajeRegistroTitulo"></div>
                                </div>

                                <div class="mb-4">
                                    <label for="registroInfo" class="form-label">Informacion Del Producto</label>
                                    <input type="text" id="registroInfo" class="form-control" />
                                    <div class="invalid-feedback" id="mensajeRegistroInfo"></div>
                                </div>

                                <div class="mb-4">
                                    <label for="registroStock" class="form-label">Stock</label>
                                    <input type="number" id="registroStock" class="form-control" />
                                    <div class="invalid-feedback" id="mensajeRegistroStock"></div>
                                </div>

                                <div class="mb-4">
                                    <label for="registroEtiquetas" class="form-label ">Etiquetas del Producto</label>
                                    <input type="text" id="registroEtiquetas" class="form-control"/>
                                    <div class="invalid-feedback" id="mensajeRegistroEtiquetas"></div>
                                </div>

                                <div class="mb-4">
                                    <label for="registroValor" class="form-label">Valor </label>
                                    <input type="number" id="registroValor" class="form-control" />
                                    <div class="invalid-feedback " id="mensajeRegistroValor"></div>
                                </div>

                                <div class="mb-4">
                                    <label for="formFile" class="form-label">Imagen</label>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button id="botonRegistroGuardar" type="button" class="btn btn-primary">Guardar Producto</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="modalEditarLabel">Modificar Producto</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <h1 class="card-title text-center mb-4">Editar Producto</h1>
                            <form id="formEditar">
                                <div class="mb-4">
                                    <label for="editar-titulo" class="form-label">Titulo</label>
                                    <input type="text" id="editar-titulo" class="form-control" />
                                </div>
                                <div class="mb-4">
                                    <label for="editar-info" class="form-label">Información</label>
                                    <input type="text" id="editar-info" class="form-control" />
                                </div>
                                <div class="mb-4">
                                    <label for="editar-stock" class="form-label">Stock</label>
                                    <input type="number" id="editar-stock" class="form-control" />
                                </div>
                                <div class="mb-4 etiquetasEditar" id="editar-etiquetas">
                                    <label class="form-label d-flex">Etiquetas</label>
                                    
                                </div>
                                <div class="mb-4">
                                    <label for="editar-valor" class="form-label">Valor</label>
                                    <input type="number" id="editar-valor" class="form-control" />
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="botonGuardarCambios" type="button" class="btn btn-success">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
            </script>
        <script type="module" src="js/control-de-productos.js"></script>
        <script type="module" src="js/alta-productos.js"></script>
</body>

</html>
