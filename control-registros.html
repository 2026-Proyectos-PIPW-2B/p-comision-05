<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panaderia</title>
    <link rel="stylesheet" href="css/customBoostrap.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style-utilities.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-primary sticky-top z-1080">
        <div class="container-fluid d-flex">
            <div class="w-45 m-0">
                <a class="navbar-brand m-0 fs-4 fw-bold">
                    <img src="img/panaderia-icon.png" alt="Icono" width="40" height="40">
                    <span class="d-none d-lg-inline">Panaderia ATR</span>
                </a>
            </div>
            <div class="circle-navbar-button dropdown">
                <button type="button" class="btn rounded rounded-circle circle-navbar-button dropdown-toggle p-0" data-bs-toggle="dropdown" role="button" aria-expanded="false">
                    <img src="img/user-profile-pic.png" alt="user-pic" class="circle-navbar-img">
                </button>
                <ul class="dropdown-menu border-info bg-light">
                    <li id="textoSesion" class="dropdown-item-text"></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a id="buttonCerrarSesion" class="dropdown-item" href="#"><i class="bi bi-box-arrow-left"></i> Cerrar sesión</a></li>
                </ul>
            </div>
            <div class="d-flex justify-content-end d-lg-none w-45">
                <button class="navbar-toggler border-0 text-black fs-4 p-0 outline-collapse-button" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="bi bi-list fs-1 p-1"></i>
                </button>
            </div>
            <div class="collapse navbar-collapse flex-grow-0 w-45" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item ms-auto fw-semibold">
                        <a class="nav-link" href="control-de-productos.html">Alta Productos</a>
                    </li>
                    <li class="nav-item ms-auto fw-semibold">
                        <a class="nav-link " href="alta-usuario.html">Alta Usuario</a>
                    </li>
                    <li class="nav-item ms-auto fw-semibold">
                        <a class="nav-link active" aria-current="page" href="control-registros.html">Registros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="registros" class="flex-grow-1 w-100 d-flex flex-column flex-lg-row">
        <div class="d-flex flex-wrap pixel-w-lg-200 border-end sticky-top bg-primary">
            <div class="ms-auto d-lg-none p-neutral">
                <div class="btn-group" role="group" aria-label="Basic outlined example">
                    <input type="checkbox" id="btnBusqueda" class="btn-check" data-bs-toggle="collapse" data-bs-target="#busqueda" aria-expanded="false" aria-controls="busqueda">
                    <label for="btnBusqueda" class="btn btn-dark">Busqueda de usuario</label>
                </div>
            </div>
            <form id="busqueda" class="collapse d-lg-block w-100 p-neutral">
                <label for="selectUsuario" class="py-neutral">Registro del Usuario:</label>
                <select name="" id="selectUsuario" class="form-select">
                    <option value="">Seleccione un Usuario...</option>
                </select>
                <div class="d-flex flex-column">
                    <label for="inputFechaInicio" class="py-neutral">Fecha De Inicio:</label>
                    <input type="date" name="" id="inputFechaInicio" class="form-control">
                    <label for="inputFechaFinal" class="py-neutral">Fecha Final:</label>
                    <input type="date" name="" id="inputFechaFinal" class="form-control">
                    <button type="button" id="filtroRegistroAdmin" class="btn btn-dark py-neutral mt-2 w-25 min-w-72 align-self-center">Aplicar</button>
                </div>
            </form>
        </div>
        <div class="p-neutral flex-grow-1 d-flex justify-content-center">
            <div id="contenedorCompras" class="max-w-1200 w-100 d-flex flex-column gap-3 bg-light">
                <p class="text-center text-muted fs-5 mt-4">Seleccione un usuario y aplique los filtros para ver el historial.</p>
            </div>
        </div>
    </section>

    <div class="modal fade z-index-modal" id="modalCompra" tabindex="-1" aria-labelledby="modalCompraLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable max-w-1200 m-neutral">
            <div class="modal-content bg-light">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 p-neutral" id="modalCompraLabel">Productos de la compra</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalProductos">
                </div>
                <div class="modal-footer">
                    <div class="w-100 d-flex justify-content-end p-neutral">
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="js/manejoDeNavbar.js"></script>
    <script type="module" src="js/control-registros.js"></script>
    <script type="module" src="modulos/registros.js"></script>
</body>

</html>
