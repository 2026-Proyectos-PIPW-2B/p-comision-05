<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panaderia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style-utilities.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-xxl navbar-dark bg-black sticky-top">
        <div class="container-fluid d-flex">
            <a class="navbar-brand w-30 m-0">Panaderia</a>
            <div class="d-flex justify-content-end d-xxl-none w-30">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

            </div>
            <div class="collapse navbar-collapse flex-grow-0 w-30" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item ms-auto">
                        <a class="nav-link text-nowrap" aria-current="page" href="control-de-productos.html">Alta
                            Productos</a>
                    </li>
                    <li class="nav-item ms-auto">
                        <a class="nav-link active" href="control-registros.html">Registros</a>
                    </li>
                    <li class="nav-item ms-auto text-nowrap">
                        <a class="nav-link " href="alta-usuario.html">Alta Usuario</a>
                    </li>
                    <li class="nav-item ms-auto">
                        <button type="button" id="btnCerrarSesion" class="btn btn-sm btn-outline-danger ms-neutral">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="registros" class="flex-grow-1 w-100 d-flex flex-column flex-lg-row">
        <div class="d-flex flex-wrap pixel-w-lg-180 border-end sticky-top">
            <div class="bg-black text-white p-neutral w-100">
                <label for="selectUsuario" class="py-neutral">Registro del Usuario:</label>
                <select name="" id="selectUsuario" class="form-select">
                    <option value="">Seleccione un Usuario...</option>
                </select>
                <div>
                    <label for="inputFechaInicio" class="py-neutral">Fecha De Inicio:</label>
                    <input type="date" name="" id="inputFechaInicio" class="form-control">
                    <label for="inputFechaFinal" class="py-neutral">Fecha Final:</label>
                    <input type="date" name="" id="inputFechaFinal" class="form-control">
                    <button type="button" id="filtroRegistroAdmin" class="btn btn-info py-neutral mt-2">Aplicar</button>
                </div>
            </div>
        </div>
        <div class="p-neutral flex-grow-1 d-flex justify-content-center">
            <div id="contenedorCompras" class="max-w-1200 w-100 d-flex flex-column gap-3">
                <p class="text-center text-muted fs-5 mt-4">Seleccione un usuario y aplique los filtros para ver el
                    historial.</p>
            </div>
        </div>
    </section>

    <div class="modal fade" id="modalCompra" tabindex="-1" aria-labelledby="modalCompraLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable max-w-1200 m-neutral">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5 p-neutral" id="modalCompraLabel">Productos de la compra</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalProductos">
                </div>
                <div class="modal-footer">
                    <div class="w-100 d-flex justify-content-end p-neutral">
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="js/control-registros.js"></script>
    <script type="module" src="modulos/registros.js"></script>
    <script type="module" src="js/manejoDeSesion.js"></script>
</body>

</html>
